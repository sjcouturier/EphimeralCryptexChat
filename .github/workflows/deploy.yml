name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - 'client/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    if: |
      contains(github.event.head_commit.modified, 'api/') ||
      contains(github.event.head_commit.modified, '.github/workflows/deploy.yml') ||
      github.event_name == 'workflow_dispatch'
    steps:
      - name: Deploy API to DigitalOcean Droplet
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            cd /var/www/EphemeralCryptexChat
            git pull origin main
            cd api
            dotnet build --configuration Release
            systemctl restart ephemeral-api
            echo "✅ API deployed and service restarted"

  deploy-client:
    runs-on: ubuntu-latest
    if: |
      contains(github.event.head_commit.modified, 'client/') ||
      contains(github.event.head_commit.modified, '.github/workflows/deploy.yml') ||
      github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'client/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Build
        run: npm run build
        working-directory: client

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'client/dist/client'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
