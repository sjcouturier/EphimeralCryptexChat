# EphemeralCryptexChat API + SignalR reverse proxy
# Backend: ASP.NET Core Kestrel on http://127.0.0.1:5058
# Frontend (Angular SPA) is hosted on GitHub Pages and talks to this origin
# over HTTPS / WSS.

# Maps the Upgrade request header to the value of the Connection response
# header so WebSocket (SignalR) connections are proxied correctly.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP -> HTTPS redirect (keeps ACME http-01 challenges working).
server {
    listen 80;
    listen [::]:80;
    server_name ephemeralcryptex.duckdns.org;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ephemeralcryptex.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/ephemeralcryptex.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ephemeralcryptex.duckdns.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Allow large encrypted payloads.
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:5058;
        proxy_http_version 1.1;

        # WebSocket / SignalR upgrade support.
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Preserve the original host + scheme so ASP.NET Core OAuth builds
        # correct absolute redirect URIs (UseForwardedHeaders).
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_cache_bypass $http_upgrade;
        proxy_buffering    off;

        # Keep long-lived WebSocket connections alive.
        proxy_connect_timeout 75s;
        proxy_read_timeout    100s;
        proxy_send_timeout    100s;
    }
}
